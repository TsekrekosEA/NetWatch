name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  # ===== STAGE 1: TEST =====
  test-backend:
    name: Test Backend Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run pytest suite
        working-directory: ./backend
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_netwatch.db

      - name: Test output summary
        if: always()
        run: echo "✅ Backend test suite completed"

  # ===== STAGE 2: BUILD & PUSH DOCKER IMAGES =====
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test-backend
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: "backend"
            path: "./backend"
            image: "${{ github.repository_owner }}/netwatch-backend"
          - name: "capture"
            path: "./capture"
            image: "${{ github.repository_owner }}/netwatch-capture"
          - name: "frontend"
            path: "./frontend"
            image: "${{ github.repository_owner }}/netwatch-frontend"
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== STAGE 3: SECURITY SCAN =====
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: test-backend
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        service:
          - name: "backend"
            path: "./backend"
          - name: "capture"
            path: "./capture"
          - name: "frontend"
            path: "./frontend"
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: false
          load: true
          tags: netwatch-${{ matrix.service.name }}:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner on local image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: netwatch-${{ matrix.service.name }}:scan
          format: "sarif"
          output: "trivy-${{ matrix.service.name }}.sarif"
          scanners: "vuln"
          vuln-type: "os,library"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service.name }}.sarif"
          category: "trivy-${{ matrix.service.name }}"

      - name: Fail on vulnerabilities
        run: |
          if grep -q '"level": "error"' trivy-${{ matrix.service.name }}.sarif; then
            echo "❌ HIGH or CRITICAL vulnerabilities detected in ${{ matrix.service.name }} image"
            exit 1
          fi
        if: github.event_name == 'push'

  # ===== STAGE 4: SUMMARY =====
  ci-cd-summary:
    name: CI/CD Summary
    runs-on: ubuntu-latest
    needs: [test-backend, build-and-push, security-scan]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [[ "${{ needs.test-backend.result }}" == "failure" || \
                "${{ needs.build-and-push.result }}" == "failure" || \
                "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ CI/CD Pipeline FAILED"
            exit 1
          else
            echo "✅ CI/CD Pipeline PASSED"
            echo "📦 Images available at ${{ env.REGISTRY }}/${{ github.repository_owner }}/netwatch-*:latest"
            exit 0
          fi
