apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netwatch-default-deny
  namespace: netwatch
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netwatch-allow-frontend-to-backend
  namespace: netwatch
spec:
  podSelector:
    matchLabels:
      component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: frontend
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netwatch-allow-capture-to-backend
  namespace: netwatch
spec:
  podSelector:
    matchLabels:
      component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: capture
      ports:
        - protocol: TCP
          port: 8000
