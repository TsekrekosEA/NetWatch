apiVersion: v1
kind: Service
metadata:
  name: {{ include "netwatch.fullname" . }}-backend
  labels:
    component: backend
    {{- include "netwatch.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ include "netwatch.fullname" . }}-backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 8000
